<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — BizStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      background: #F5F5F7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      font-size: 1.4rem;
      font-weight: 800;
      color: #4F46E5;
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }
    .auth-subtitle {
      font-size: 0.875rem;
      color: #6B7280;
      margin-bottom: 2rem;
    }
    .form-label {
      font-weight: 600;
      font-size: 0.875rem;
      color: #374151;
    }
    .form-control {
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      transition: all 0.15s ease;
    }
    .form-control:focus {
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .btn-signin {
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.65rem;
      width: 100%;
      transition: all 0.15s ease;
      margin-top: 0.5rem;
    }
    .btn-signin:hover {
      background: #4338CA;
      transform: translateY(-1px);
      color: white;
    }
    .auth-divider {
      text-align: center;
      color: #9CA3AF;
      font-size: 0.8rem;
      margin: 1.25rem 0;
      position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #E5E7EB;
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }
    .auth-footer {
      text-align: center;
      font-size: 0.875rem;
      color: #6B7280;
      margin-top: 1.5rem;
    }
    .auth-footer a {
      color: #4F46E5;
      font-weight: 600;
      text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .alert {
      border-radius: 10px;
      font-size: 0.875rem;
      border: none;
      padding: 0.75rem 1rem;
    }
    .errorlist {
      color: #dc3545;
      font-size: 0.8rem;
      list-style: none;
      padding-left: 0;
      margin-bottom: 0;
    }
    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap .bi {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #9CA3AF;
      font-size: 1rem;
    }
    .input-icon-wrap .form-control {
      padding-left: 2.2rem;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <i class="bi bi-bag-fill me-1"></i> BizStore
    </div>
    <div class="auth-subtitle">Sign in to your account</div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
       {% csrf_token %}
        
       {{ form.non_field_errors }}
        
       <div class="mb-3">
         <label class="form-label">Username</label>
         <div class="input-icon-wrap">
           <i class="bi bi-person"></i>
           {{ form.username }}
           {{ form.username.errors }}
         </div>
       </div>
       <div class="mb-3">
         <label class="form-label">Password</label>
         <div class="input-icon-wrap">
           <i class="bi bi-lock"></i>
           {{ form.password }}
           {{ form.password.errors }}
         </div>
       </div>
       <button type="submit" class="btn-signin">
         <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
       </button>
     </form>

    <div class="auth-divider">or</div>

    <div class="auth-footer">
      Don't have an account?
      <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>

</body>
</html>
