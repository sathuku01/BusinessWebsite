{% extends "ecommerce/base.html" %}
{% block title %}Add Supplier — BizStore{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
  <div>
    <h1>Add Supplier</h1>
    <p>Register product supplier</p>
  </div>
  <a href="{% url 'consignment_list' %}" class="btn btn-outline-secondary">Back</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name</label>
          {{ form.name }}
        </div>
        <div class="col-md-6">
          <label class="form-label">Contact Person</label>
          {{ form.contact_person }}
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          {{ form.phone }}
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          {{ form.email }}
        </div>
        <div class="col-12">
          <label class="form-label">Address</label>
          {{ form.address }}
        </div>
      </div>
      <button type="submit" class="btn btn-primary mt-4">Save Supplier</button>
    </form>
  </div>
</div>
{% endblock %}
