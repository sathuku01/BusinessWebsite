{% extends "ecommerce/base.html" %}

{% block title %}Place Order{% endblock %}

{% block content %}
<div class="row g-4">

  <!-- Left column — Order form -->
  <div class="col-12 col-lg-7">
    <div class="card shadow-sm rounded-3 p-4">
      <h4 class="mb-4">Place New Order</h4>
      <form method="post" action="" id="order-form">
        {% csrf_token %}

        <!-- Product -->
        <div class="mb-3">
          <label for="productSelect" class="form-label">Product</label>
          <select name="product" id="productSelect" class="form-select">
            <option value="">— Select a product —</option>
            {% for product in form.fields.product.queryset %}
              <option
                value="{{ product.id }}"
                data-price="{{ product.price }}"
                data-stock="{{ product.stock }}"
                {% if product.stock == 0 %}disabled{% endif %}
              >
                {{ product.name }} — KSh {{ product.price|floatformat:0 }} ({{ product.stock }} in stock)
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Quantity -->
        <div class="mb-3">
          <label for="quantityInput" class="form-label">Quantity</label>
          <input
            type="number"
            name="quantity"
            id="quantityInput"
            class="form-control"
            min="1"
            value="1"
          >
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Place Order</button>
      </form>
    </div>
  </div>

  <!-- Right column — Order summary -->
  <div class="col-12 col-lg-5">
    <div class="card shadow-sm rounded-3 p-4 bg-light">
      <h5 class="mb-3">Order Summary</h5>
      <table class="table table-borderless mb-0">
        <tbody>
          <tr>
            <td class="text-muted">Product</td>
            <td class="text-end" id="summary-product">Select a product</td>
          </tr>
          <tr>
            <td class="text-muted">Unit price</td>
            <td class="text-end" id="summary-price">—</td>
          </tr>
          <tr>
            <td class="text-muted">Quantity</td>
            <td class="text-end" id="summary-quantity">1</td>
          </tr>
          <tr class="border-top">
            <td class="fw-bold">Total</td>
            <td class="text-end fw-bold fs-5" id="summary-total">KSh —</td>
          </tr>
        </tbody>
      </table>
      <p class="text-muted mt-3 mb-0" style="font-size: 0.875rem;">
        Payment can be made after the order is placed.
      </p>
    </div>
  </div>
</div>

<!-- JavaScript — dynamic summary + confirmation dialog -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  const productSelect   = document.getElementById('productSelect');
  const quantityInput   = document.getElementById('quantityInput');
  const orderForm       = document.getElementById('order-form');
  const summaryProduct  = document.getElementById('summary-product');
  const summaryPrice    = document.getElementById('summary-price');
  const summaryQuantity = document.getElementById('summary-quantity');
  const summaryTotal    = document.getElementById('summary-total');

  function updateSummary () {
    var selectedOption = productSelect.options[productSelect.selectedIndex];
    var productName    = selectedOption.textContent.trim();
    var price          = parseFloat(selectedOption.dataset.price) || 0;
    var stock          = parseInt(selectedOption.dataset.stock) || 0;
    var quantity       = Math.max(1, Math.min(parseInt(quantityInput.value) || 1, stock || 99999));

    if (selectedOption.value === '') {
      summaryProduct.textContent  = 'Select a product';
      summaryPrice.textContent    = '—';
      summaryTotal.textContent    = 'KSh —';
    } else {
      summaryProduct.textContent  = productName;
      summaryPrice.textContent    = 'KSh ' + price.toLocaleString();
      summaryTotal.textContent    = 'KSh ' + (price * quantity).toLocaleString();
    }
    summaryQuantity.textContent = quantity;
  }

  productSelect.addEventListener('change', function () {
    var selected = this.options[this.selectedIndex];
    if (selected.value && parseInt(selected.dataset.stock)) {
      quantityInput.max = parseInt(selected.dataset.stock);
    }
    quantityInput.value = quantityInput.min;
    updateSummary();
  });

  quantityInput.addEventListener('input', updateSummary);

  orderForm.addEventListener('submit', function (e) {
    if (!confirm('Confirm order?')) {
      e.preventDefault();
    }
  });
});
</script>
{% endblock %}
