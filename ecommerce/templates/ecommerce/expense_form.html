{% extends "ecommerce/base.html" %}
{% block title %}Add Expense — BizStore{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
  <div>
    <h1>Record Expense</h1>
    <p>Track operational costs</p>
  </div>
  <a href="{% url 'expense_list' %}" class="btn btn-outline-secondary">Back</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Category</label>
          {{ form.category }}
        </div>
        <div class="col-md-6">
          <label class="form-label">Amount (KSh)</label>
          {{ form.amount }}
        </div>
        <div class="col-md-6">
          <label class="form-label">Description</label>
          {{ form.description }}
        </div>
        <div class="col-md-6">
          <label class="form-label">Date</label>
          {{ form.date }}
        </div>
      </div>
      <button type="submit" class="btn btn-primary mt-4">Record Expense</button>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const today = new Date().toISOString().split('T')[0];
  document.querySelector('input[name="date"]').value = today;
});
</script>
{% endblock %}
